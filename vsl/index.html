<script>
/* [ CIUDAD ] — mostra a cidade real do visitante (geo por IP).
   Se a geo falhar/for bloqueada, cai numa cidade LATAM aleatória (nunca exibe "tu ciudad"). */
(function(){
  var ciudades = ['Ciudad de México','Buenos Aires','Bogotá','Lima','Santiago','Guadalajara',
    'Monterrey','Medellín','Córdoba','Quito','Caracas','Santo Domingo','Guayaquil','Puebla',
    'Rosario','Cali','Montevideo','San José','Ciudad de Panamá','Asunción'];
  var el = document.getElementById('ciudad');
  function setCity(name){ if(el && name){ el.textContent = name; } }
  /* default imediato: já entra uma cidade de respeito (sem flash de "tu ciudad") */
  setCity(ciudades[Math.floor(Math.random()*ciudades.length)]);
  /* tenta a cidade real e sobrescreve, se a geo responder */
  fetch('https://ipwho.is/').then(function(r){return r.json();}).then(function(d){
    if(d && d.city){ setCity(d.city); }
  }).catch(function(){
    fetch('https://get.geojs.io/v1/ip/geo.json').then(function(r){return r.json();}).then(function(d){
      if(d && d.city){ setCity(d.city); }
    }).catch(function(){});
  });
})();

/* [ FECHA ] — mostra a data de HOJE em espanhol.
   Para exibir AMANHÃ, descomente a linha do setDate. */
(function(){
  var meses=['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];
  var d=new Date();
  /* d.setDate(d.getDate()+1); */  /* <-- descomente para AMANHÃ */
  document.getElementById('fecha').textContent = d.getDate()+' de '+meses[d.getMonth()]+' de '+d.getFullYear();
})();
</script>
