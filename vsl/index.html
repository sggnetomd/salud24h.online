<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1">
<meta name="robots" content="noindex, nofollow">
<title>Presentación exclusiva</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{ --red:#de2800; --dark:#292929; --text:#1a1a1a; }
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:'Nunito',ui-rounded,system-ui,sans-serif;background:#fff;color:var(--text);line-height:1.5;-webkit-font-smoothing:antialiased}
  img{max-width:100%;height:auto;display:block}

  /* barra do topo (vermelha) */
  .topbar{background:var(--red);color:#fff;text-align:center;padding:16px 20px;font-size:18px;font-weight:600;line-height:1.4}
  .topbar strong{color:#000;font-weight:800}
  @media(max-width:480px){ .topbar{font-size:15px} }

  /* coluna central */
  .wrap{max-width:760px;margin:0 auto;padding:34px 20px 40px;text-align:center}

  /* aviso (assista até o final / data) */
  .notice{font-size:24px;font-weight:400;line-height:1.4;margin-bottom:24px}
  .notice .date{color:var(--red);font-weight:700}
  @media(max-width:480px){ .notice{font-size:18px} }

  /* caixa do vídeo */
  .video-box{margin:0 auto;max-width:760px}

  /* rodapé genérico (sem produto, sem links legais) */
  .foot{background:var(--dark);color:#fff;text-align:center;padding:26px 20px}
  .foot p{font-size:13px;opacity:.85}
</style>
</head>
<body>

  <!-- ═══ BARRA DO TOPO ═══ -->
  <div class="topbar">
    Tú y algunas personas de <strong id="ciudad">tu ciudad</strong> han sido seleccionadas para ver esta presentación.
  </div>

  <div class="wrap">

    <!-- ═══ AVISO — a data é automática (script no fim da página) ═══ -->
    <h2 class="notice">
      Mira hasta el final. Esta presentación saldrá del aire el
      <span class="date" id="fecha">hoy</span>.
    </h2>

    <!-- ═══ VÍDEO ═══ -->
    <div class="video-box">
      <!-- ▼▼▼  COLE AQUI O SCRIPT DO VTURB (o player + o <script>)  ▼▼▼ -->

    </div>

  </div>

  <!-- ═══ RODAPÉ GENÉRICO ═══ -->
  <footer class="foot">
    <p>© 2026 · Todos los derechos reservados.</p>
  </footer>

<!-- ═══════════ SCRIPTS ═══════════ -->
<script>
/* [ CIUDAD ] — troca "tu ciudad" pela cidade real do visitante (geo por IP).
   Se a API falhar ou for bloqueada, mantém "tu ciudad". */
(function(){
  fetch('https://ipwho.is/').then(function(r){return r.json();}).then(function(d){
    if(d && d.city){ document.getElementById('ciudad').textContent = d.city; }
  }).catch(function(){});
})();

/* [ FECHA ] — mostra a data de HOJE em espanhol.
   Para exibir AMANHÃ, descomente a linha do setDate. */
(function(){
  var meses=['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];
  var d=new Date();
  /* d.setDate(d.getDate()+1); */  /* <-- descomente para AMANHÃ */
  document.getElementById('fecha').textContent = d.getDate()+' de '+meses[d.getMonth()]+' de '+d.getFullYear();
})();
</script>

</body>
</html>
